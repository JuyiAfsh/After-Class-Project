<!DOCTYPE html>
<html>
    <head>
        <title>Multiplication</title>
    </head>
 <body>
    <p id="demo"></p>
    <p id="multi"></p>
    <p id="vari"></p>
    <script>
        var a = 6;
        var b = 8;
        document.getElementById("demo").innerHTML = b * a;
        var c = a + 7;
        var d = 5;
        document.getElementById("multi").innerHTML = c * d;
        var x = b - a;
        var y = a/x;
        document.getElementById("vari").innerHTML = y * x;
    </script>
    </body>
</html>
