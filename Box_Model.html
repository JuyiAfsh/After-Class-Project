<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Box Model Example</title>
    <style type="text/css">
        .box1 {
            width: 250px;
            background-color: lightblue;
            padding: 15px 15px 35px 45px;
            border: 0px;
            margin: 0px;
            float: right;
        }

        .box2 {
            width: 250px;
            background-color: violet;
            padding: 85px;
            border: 7px double darkmagenta;
            margin: 80px 80px;
        }
    </style>
    </head>
    <body>
        <h1>Box Models</h1>
        <hr>
        <p class="box1">My Content Box 1</p>
        <p class="box2">My Content Box 2</p>
    </body>
    </html>
