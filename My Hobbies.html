<!DOCTYPE html>
<html>

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="My Hobbies.css">

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"> </script>
</head>

<body>
    <div class="container border border-dark p-3 my-5 bg-info text-white">
        <h3>Some of my hobbies include:</h3>
        <ul>
            <li id="read">Reading</li>
            <li id="crochet">Crochet</li>
            <li id="skip">Skipping</li>
        </ul>
    </div>
    <div style="text-align: center;">
  <image src="books.jpeg"/>
  <blockquote class="blockquote">
    <p>"A reader lives a thousand lives before he dies . . . The man who never reads lives only one."</p>
    <footer class="blockquote-footer">George R.R. Martin</footer>
  </blockquote>
</div>
<div style="text-align: center;">
  <h4>My favourite crochet video</h4>
  <video width="400" height="300" controls autoplay poster="image.png" loop>
    <source src="crochet.mp4" type="video/mp4">
    Your browser does not support the video tag
  </video><br>
  </div><br>
  <div style="text-align: center;">
    <h4>How to skip tutorial</h4>
  <embed><iframe width="560" height="315" src="https://www.youtube.com/embed/vEJ7XbbAMAg?si=af3uvKNBFfOsQcs2"
    title="YouTube video player" frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
  </body>
  </html>
