<!DOCTYPE html>
<html lang="en">

<head>
    <title>Scrollspy Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link href="ali hardware.css" rel="stylesheet" type="text/css" />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

<style>
    body {
        position: relative;

    }
    p {
        font-size: 23px;
    }
    #products {
        padding-top: 55px;
        height: 1000px;
        color: black;
        background-color: red;
    }
    #images {
        padding-top: 55px;
        height: 3000px;
        color: black;
        background-color: blue;
    }
    #shop {
      padding-top: 55px;
        height: 1000px;
        color: black;
        background-color: yellow;  
    }
</style>
</head>
<body data-spy="scroll" data-target=".navbar" data-offset="50">
    <nav class="navbar navbar-inverse navbar-fixed-top" id="myNavbar">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#myNavbar">
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="#"></a>
            </div>
            <div class="nav navbar-collapse" id="myNavbar">
                <ul class="nav navbar-nav">
                    <li><a href="#products">Products</a></li>
                    <li><a href="#images">Images</a></li>
                    <li><a href="#shop">Shop</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div id="products" class="container-fluid">
        <h1>Products Available</h1>
        <ul><h3>
            <li>Paint</li>
            <li>Spades</li>
            <li>Saws</li>
            <li>Wood Planks</li>
        </ul></h3>
    </div>
    <div id="images" class="container-fluid">
        <h1>Product images</h1>
        <div style="text-align: center;">
            <image  class="product" style="margin: 15px" src="ali.png" /><br>
            <image class="product" style="margin: 15px" src="ali4.png" /><br>
            <image class="product" style="margin: 15px" src="ali5.png" /><br>
            <image class="product" style="margin: 15px" src="IMG-20211026-WA0112.jpg" /><br>
        </div>
    </div>
    <div id="shop" class="container-fluid">
        <div style="text-align: center;">
            <h1>Shop</h1>
            <image class="product" style="margin: 15px" src="ali3.png" /><br>
        </div>
    </div>
</body>
</html>
