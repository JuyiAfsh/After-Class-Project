<!DOCTYPE html>
<html>



<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title> Registration
    </title>
    <link href="styles.css" rel="stylesheet" type="text/css" />
    <style>
        
        #submit {
            cursor: pointer;
            background-color: greenyellow;
            padding: 5px;
        }

        body {
            background-color: blanchedalmond;
            
        }

        label {
            font-family: monospace;
            font-size: larger;
        }

        h1 {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
    </style>
</head>

<body>
    <h1>Personal Details Form</h1>
    <form>
        <label>Name</label><br>
        <input type="text" id="name"><br><br>

        <label>Email ID</label><br>
        <input type="email" id="email"><br><br>

        <label>Password (this will be hidden)</label><br>
        <input type="password" id="password"><br><br>
        
        <label>Gender</label><br>
        <input type="radio" id="female" name="gender" value="female" > Female <br>
        <input type="radio" id="female" name="gender" value="Male"> Male <br><br>

        <label>City Name</label><br>
        <input type="checkbox" id="city1" value="Johannesburg" >Joburg<br>
        <input type="checkbox" id="city2" value="Pretoria">Pretoria <br>
        <input type="submit" id="submit">
    </form>
</body>
</html>
